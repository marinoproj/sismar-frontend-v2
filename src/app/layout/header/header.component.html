<header
  class="h-16 flex items-center px-4 gap-4 border-b border-gray-200 dark:border-gray-200 bg-[var(--color-header-bg)] shrink-0 z-10"
>
  <!-- Toggle sidebar -->
  <button
    (click)="layout.toggle()"
    class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-600 dark:text-gray-300 transition-colors"
    aria-label="Toggle sidebar"
  >
    <i class="ri-menu-line text-xl"></i>
  </button>

  <!-- Logo (mobile only) -->
  <img
    [src]="config.logoUrl"
    [alt]="config.appName"
    class="h-8 md:hidden"
    onerror="this.style.display='none'"
  />

  <!-- Spacer -->
  <div class="flex-1"></div>

  <!-- Actions -->
  <div class="flex items-center gap-2">
    <!-- Dark mode toggle -->
    <button
      (click)="toggleTheme()"
      class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-600 dark:text-gray-300 transition-colors"
      [attr.aria-label]="isDark ? 'Ativar modo claro' : 'Ativar modo escuro'"
    >
      <i [class]="isDark ? 'ri-sun-line' : 'ri-moon-line'" class="text-xl"></i>
    </button>

    <!-- Notifications -->
    <button
      class="relative p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-600 dark:text-gray-300 transition-colors"
      aria-label="Notificações"
    >
      <i class="ri-notification-3-line text-xl"></i>
      @if (notificationCount() > 0) {
        <span
          class="absolute top-1 right-1 w-4 h-4 bg-red-500 text-white text-xs rounded-full flex items-center justify-center font-bold"
        >
          {{ notificationCount() }}
        </span>
      }
    </button>

    <!-- User menu -->
    <div class="relative">
      <button
        (click)="toggleUserMenu()"
        class="flex items-center gap-2 p-1.5 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"
      >
        <div
          class="w-8 h-8 rounded-full bg-[var(--color-primary)] text-white flex items-center justify-center text-sm font-semibold"
        >
          {{ auth.session()?.name?.[0]?.toUpperCase() ?? 'U' }}
        </div>
        <i class="ri-arrow-down-s-line text-gray-500 dark:text-gray-400 hidden md:block"></i>
      </button>

      @if (userMenuOpen()) {
        <div
          class="absolute right-0 top-full mt-1 w-48 bg-white dark:bg-gray-800 rounded-lg shadow-lg border border-gray-200 dark:border-gray-700 py-1 z-50"
        >
          <button
            class="w-full px-4 py-2 text-sm text-left text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 flex items-center gap-2"
          >
            <i class="ri-user-line"></i> Perfil
          </button>
          <hr class="my-1 border-gray-200 dark:border-gray-700" />
          <button
            (click)="logout()"
            class="w-full px-4 py-2 text-sm text-left text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 flex items-center gap-2"
          >
            <i class="ri-logout-box-r-line"></i> Sair
          </button>
        </div>
      }
    </div>
  </div>
</header>
