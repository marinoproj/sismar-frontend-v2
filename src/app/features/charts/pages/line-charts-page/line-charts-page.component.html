<div class="space-y-6">
  <div>
    <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Line Charts</h1>
    <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Exemplos de gráficos de linha com variações de dados</p>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
    <div class="bg-white dark:bg-gray-800 rounded-xl p-4 border border-gray-100 dark:border-gray-700">
      <p class="text-xs text-gray-400 dark:text-gray-500 mb-3 uppercase tracking-wider font-medium">Linha única</p>
      <app-line-chart [data]="singleLine" title="Receita Mensal" />
    </div>
    <div class="bg-white dark:bg-gray-800 rounded-xl p-4 border border-gray-100 dark:border-gray-700">
      <p class="text-xs text-gray-400 dark:text-gray-500 mb-3 uppercase tracking-wider font-medium">Múltiplas linhas</p>
      <app-line-chart [data]="multiLine" title="Comparativo de Produtos" />
    </div>
    <div class="bg-white dark:bg-gray-800 rounded-xl p-4 border border-gray-100 dark:border-gray-700 lg:col-span-2">
      <p class="text-xs text-gray-400 dark:text-gray-500 mb-3 uppercase tracking-wider font-medium">Linha com degrau — comparando real vs meta</p>
      <app-line-chart [data]="steppedLine" title="Usuários Ativos vs Meta" />
    </div>
  </div>
</div>
