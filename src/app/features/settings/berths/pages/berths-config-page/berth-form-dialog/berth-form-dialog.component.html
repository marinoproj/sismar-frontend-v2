<app-modal-shell [title]="isEdit ? 'Editar berço' : 'Novo berço'" panelClass="max-w-lg" (closed)="cancel()">
  <form [formGroup]="form" (ngSubmit)="save()" class="space-y-4">

    <!-- Porto (auxiliar, não é campo do berço) -->
    <div>
      <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
        Porto <span class="text-red-500">*</span>
      </label>
      <select
        formControlName="portId"
        [class.border-red-500]="portIdControl.invalid && portIdControl.touched"
        class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg text-sm text-gray-900 dark:text-white bg-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-[var(--color-primary)]"
      >
        <option [ngValue]="null" disabled>Selecione um porto</option>
        @for (port of ports; track port.id) {
          <option [ngValue]="port.id">{{ port.name }}</option>
        }
      </select>
      @if (portIdControl.invalid && portIdControl.touched) {
        <p class="mt-1 text-xs text-red-600 dark:text-red-400">Porto é obrigatório.</p>
      }
    </div>

    <!-- Terminal -->
    <div>
      <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
        Terminal <span class="text-red-500">*</span>
      </label>
      <select
        formControlName="terminalId"
        [class.border-red-500]="terminalIdControl.invalid && terminalIdControl.touched"
        class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg text-sm text-gray-900 dark:text-white bg-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-[var(--color-primary)]"
      >
        <option [ngValue]="null" disabled>Selecione um terminal</option>
        @for (terminal of terminalOptions(); track terminal.id) {
          <option [ngValue]="terminal.id">{{ terminal.name }}</option>
        }
      </select>
      @if (terminalIdControl.invalid && terminalIdControl.touched) {
        <p class="mt-1 text-xs text-red-600 dark:text-red-400">Terminal é obrigatório.</p>
      }
    </div>

    <!-- Área -->
    <div>
      <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Área</label>
      <select
        formControlName="areaId"
        class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg text-sm text-gray-900 dark:text-white bg-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-[var(--color-primary)]"
      >
        <option [ngValue]="null">Nenhuma</option>
        @for (area of areaOptions; track area.id) {
          <option [ngValue]="area.id">{{ area.name }}</option>
        }
      </select>
    </div>

    <!-- Nome -->
    <div>
      <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
        Nome <span class="text-red-500">*</span>
      </label>
      <input
        type="text"
        formControlName="name"
        placeholder="Berço 01 Leste"
        [class.border-red-500]="nameControl.invalid && nameControl.touched"
        class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg text-sm text-gray-900 dark:text-white bg-white dark:bg-gray-700 placeholder:text-gray-400 dark:placeholder:text-gray-500 focus:outline-none focus:ring-2 focus:ring-[var(--color-primary)]"
      />
      @if (nameControl.invalid && nameControl.touched) {
        <p class="mt-1 text-xs text-red-600 dark:text-red-400">Nome é obrigatório.</p>
      }
    </div>

    <!-- Comprimento / Calado -->
    <div class="grid grid-cols-2 gap-3">
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Comprimento (m)</label>
        <input
          type="number"
          formControlName="length"
          step="any"
          class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg text-sm text-gray-900 dark:text-white bg-white dark:bg-gray-700 placeholder:text-gray-400 dark:placeholder:text-gray-500 focus:outline-none focus:ring-2 focus:ring-[var(--color-primary)]"
        />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Calado (m)</label>
        <input
          type="number"
          formControlName="draft"
          step="any"
          class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg text-sm text-gray-900 dark:text-white bg-white dark:bg-gray-700 placeholder:text-gray-400 dark:placeholder:text-gray-500 focus:outline-none focus:ring-2 focus:ring-[var(--color-primary)]"
        />
      </div>
    </div>
  </form>

  <ng-container modal-footer>
    <app-button variant="ghost" [disabled]="saving()" (clicked)="cancel()">Cancelar</app-button>
    <app-button [disabled]="form.invalid || saving()" [loading]="saving()" (clicked)="save()">Salvar</app-button>
  </ng-container>
</app-modal-shell>
