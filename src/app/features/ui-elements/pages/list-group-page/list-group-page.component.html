<div class="space-y-6">
  <div>
    <h1 class="text-2xl font-bold text-gray-900 dark:text-white">List group</h1>
    <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Listas de itens com suporte a item ativo, badge e ícones</p>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
    <div class="bg-white dark:bg-gray-800 rounded-xl p-6 border border-gray-100 dark:border-gray-700">
      <h2 class="text-sm font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-4">Lista simples</h2>
      <app-list-group [items]="simpleItems" />
    </div>
    <div class="bg-white dark:bg-gray-800 rounded-xl p-6 border border-gray-100 dark:border-gray-700">
      <h2 class="text-sm font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-4">Com badges</h2>
      <app-list-group [items]="badgeItems" />
    </div>
    <div class="bg-white dark:bg-gray-800 rounded-xl p-6 border border-gray-100 dark:border-gray-700">
      <h2 class="text-sm font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-4">Com ícones e descrições</h2>
      <app-list-group [items]="iconItems" />
    </div>
  </div>
</div>
