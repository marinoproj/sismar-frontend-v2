<div class="space-y-6">
  <div>
    <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Badges</h1>
    <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Rótulos de status e contagem com variações de cor</p>
  </div>

  <div class="bg-white dark:bg-gray-800 rounded-xl p-6 border border-gray-100 dark:border-gray-700">
    <h2 class="text-sm font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-4">Variantes</h2>
    <div class="flex flex-wrap gap-3">
      <app-badge label="Default" variant="default" />
      <app-badge label="Primary" variant="primary" />
      <app-badge label="Success" variant="success" />
      <app-badge label="Warning" variant="warning" />
      <app-badge label="Danger" variant="danger" />
    </div>
  </div>

  <div class="bg-white dark:bg-gray-800 rounded-xl p-6 border border-gray-100 dark:border-gray-700">
    <h2 class="text-sm font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-4">Casos de uso comuns</h2>
    <div class="flex flex-wrap gap-3">
      <app-badge label="Novo" variant="primary" />
      <app-badge label="Ativo" variant="success" />
      <app-badge label="Pendente" variant="warning" />
      <app-badge label="Inativo" variant="default" />
      <app-badge label="Cancelado" variant="danger" />
      <app-badge label="12 mensagens" variant="danger" />
      <app-badge label="Beta" variant="warning" />
      <app-badge label="v2.0" variant="default" />
    </div>
  </div>
</div>
